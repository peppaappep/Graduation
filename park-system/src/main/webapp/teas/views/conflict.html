<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>冲突信息</title>
    <link rel="stylesheet" type="text/css" href="../../res/libs/layui/css/layui.css" />
    <link rel="stylesheet" type="text/css" href="../../res/libs/zTree/css/zTreeStyle/zTreeStyle.css">
    <link rel="stylesheet" type="text/css" href="../../res/dsf_styles/dsf_style.css" />
    <link rel="stylesheet" type="text/css" href="../../res/dsf_styles/font/iconfont.css" />
    <link rel="stylesheet" type="text/css" href="../../res/dsf_styles/bhc.css" />
    <style>
        .ds_item {
            border: 1px solid #E6E6E6;
            border-radius: 5px;
            background-color: #fff;
            padding: 10px;
            margin-top: 5px;
        }
        
        .ds_item .item-content {
            margin-bottom: 5px;
        }
        
        .ds_item label {
            width: 80px;
            text-align: right;
            font-weight: 700;
            display: inline-block;
        }
    </style>
</head>

<body style="background-color:#fff">
    <div id="view">
        <div class="ds_page" style="padding:10px;">

        </div>
    </div>
    <script src="../../res/libs/jquery-1.12.4.min.js"></script>
    <script src="../../res/libs/layui/layui.all.js"></script>
    <script src="../../res/libs/lodash/lodash.min.js"></script>
    <script src="../../app.js"></script>
    <script src="../../res/dsf_res/dsf_config.js"></script>
    <script src="../../res/dsf_res/dsf_common.js"></script>
    <script src="../../dsfa/bhc/hc/bhc.js"></script>
    <script type="text/html" id="typeTpl">
        <%for(var i=0;i<list.length;i++){%>
            <div class="ds_item">
                <div style="float:left;width:<%=(list[i].hasGx?80:100)%>%">
                    <div class="item-content">
                        <label>班次名称:</label>
                        <%=list[i].bjname%>
                    </div>
                    <div class="item-content"><label>所授课程:</label>
                        <%=list[i].kc_text%>
                    </div>
                    <div class="item-content">
                        <label>授课教师:</label>
                        <%=list[i].skjs_text%>
                    </div>
                    <div class="item-content">
                        <label>授课地点:</label>
                        <%=list[i].skdd_text%>
                    </div>
                    <div class="item-content"><label>授课地点:</label>
                        <%=list[i].sksjText%>
                    </div>
                    <div class="item-content"><label>冲突类型:</label>
                        <span style="color:red"><%=list[i].cttype_text%></span>
                    </div>
                </div>
                <%if(list[i].hasGx){%>
                    <div class="hasGx" style="float:left;width:20%">
                        <div style="text-align:right"><button class="ds_button" onclick="merge('<%=list[i]['teas_jwgl_pkgl_id']%>')">与其合班</button></div>
                    </div>
                    <%}%>
                        <div style="clear:both"></div>
            </div>
            <%}%>
    </script>
    <script>
        window._appInit();
        $(document).on("ds_page_complete", function() {
            var pkid = dsf.url.queryString("pkid");
            var classId=dsf.url.queryString("classid");
            // var isConflictInfo = dsf.url.queryString("isinfo") == "1" ? true : false;
            if (pkid) {
                let dindex=dsf.layer.loadding();
                var url = dsf.url.getWebPath("teas/jwgl/pkgl/pkxx/course/ctList?pkglId=" + pkid);
                dsf.http.request(url,{"classId":classId}, "GET")
                    .done(function(response) {
                        if (response.success) {
                            renderList(response.data);
                        } else {
                            dsf.layer.message("加载数据出错", false)
                        }
                    })
                    .error(function(response) {
                        dsf.layer.message("加载数据出错", false)
                    }).always(function(){
                        dsf.layer.close(dindex)
                    }).exec();
            } else {
                let args = window.frameElement.args.ctlist;
                renderList(args)
            }

        });

        function renderList(data) {
            var template = $("#typeTpl").text();
            var templateHtml = ejs.compile(template);
            var list = [];
            for (var i = 0; i < data.length; i++) {
                var d = data[i];
                d.sksjText = dsf.date.formatRangeDateTime(d.sksj_sdate, d.sksj_edate);
                var result = _.find(list, function(o) {
                    return o["teas_jwgl_pkgl_id"] == d["teas_jwgl_pkgl_id"];
                });
                if (result) {
                    let arr = (result.cttype_text || "").split(",");
                    arr.push(d.cttype_text)
                    result.cttype_text = arr.join(",");
                } else {
                    list.push(d);
                }
            }
            var html = templateHtml({
                "list": list
            });
            $(".ds_page").html(html);
        }

        function merge(targetPkId) {
            let data = $.extend({}, window.frameElement.args.formData);
            let callback = window.frameElement.args.callback;
            data.mergePkglId = targetPkId;
            let postData = {
                "namespace": "teas.jwgl.pkgl",
                "pageName": "edit",
                "data": JSON.stringify(data)
            }
            let url = dsf.UrlSetting.form_save;
            let index = dsf.layer.loadding();
            dsf.http.request(url, postData, "POST")
                .done(function(response) {
                    if (response.success) {
                        callback(null, response.data);
                    } else {
                        callback(response.data, null);
                    }
                })
                .error(function(response) {
                    callback(response, null);
                })
                .always(function() {
                    dsf.layer.close(index);
                }).exec();
        }
    </script>
</body>

</html>
