<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>选择控件组</title>
    <link rel="stylesheet" type="text/css" href="../../../res/libs/layui/css/layui.css" />
    <link rel="stylesheet" type="text/css" href="../../../res/dsf_styles/dsf_style.css" />
    <link rel="stylesheet" type="text/css" href="../../../res/dsf_styles/font/iconfont.css" />
    <link rel="stylesheet" type="text/css" href="../../../res/libs/zTree/css/zTreeStyle/zTreeStyle.css" />
    <style>
        ._special_ico_docu {
            margin-right: 2px !important;
            background-position: -110px -2px;
        }
        
        .ztree li span.button.chk {
            margin-left: 3px
        }
        
        .ds_tree_box .ds_tree {
            height: 430px;
        }
        
        .layui-tab {
            margin: 0;
        }
        
        .layui-tab-item {
            max-height: 389px;
            overflow: auto;
            box-sizing: border-box;
        }
		body{
			padding-top: 50px;
			overflow: hidden;
			box-sizing: border-box;
		}
		.ds_tree_box{
			position: absolute;
			top: 0;
			height: 50px;
			left: 0;
			right: 0;
		}
		.tree-box{
			overflow: auto;
			height: 100%;
			box-sizing: border-box;
		}
    </style>
</head>

<body>
    <div class="ds_tree_box">
        <div class="ds_tree_search">
            <input type="text" class="layui-input" placeholder="输入名称" id="search_input" autocomplete="off">
            <i class="search iconfont layui-icon icon-Magnifier" id="search"></i>
        </div>
    </div>
    <div class="tree-box">
        <ul id="tree" class="ztree"></ul>
    </div>

    <script src="../../../res/libs/jquery-1.12.4.min.js"></script>
    <script src="../../../res/libs/layui/layui.all.js"></script>
    <script src="../../../res/libs/lodash/lodash.min.js"></script>
    <script src="../../../app.js"></script>
    <script src="../../../res/dsf_res/dsf_config.js"></script>
    <script src="../../../res/dsf_res/dsf_common.js"></script>
    <script src="../res/ds_prop.js"></script>
    <script src="../../../dsfa/bhc/hc/bhc.js"></script>
    <script src="../../../res/libs/zTree/js/jquery.ztree.all.min.js"></script>
    <script>
        var tree = null,
            nodeList = [],
            TabNum = 0,
            nodeListOther = [];
        $('#search').on('click', function(e) {
            // 搜索
            search();
        });
        $('#search_input').on('keyup', function(e) {
            // 回车搜索
            var keycode = window.event ? e.keyCode : e.which;
            if (keycode == 13) {
                search();
            }
        });

        function search() {
            updateNodes(false);
            var v = $('#search_input').val();
            if (v == '' || !v) return;
            var treeObj =tree;
            nodeList = treeObj.getNodesByParamFuzzy('name', v);
            if (nodeList.length > 0) treeObj.selectNode(nodeList[0], false, false);
            updateNodes(true, false);

            var treeObjOther =tree;
            nodeListOther = treeObjOther.getNodesByParamFuzzy('name', v);
            updateNodes(true, true);
        }

        function getFontCss(treeId, treeNode) {
            return (!!treeNode.highlight) ? {
                color: "#A60000",
                "font-weight": "bold"
            } : {
                color: "#333",
                "font-weight": "normal"
            };
        }

        function updateNodes(highlight, isOther) {
            for (var i = 0, l = nodeList.length; i < l; i++) {
                nodeList[i].highlight = highlight;
                tree.updateNode(nodeList[i]);
                if (isOther || !highlight) {
                    nodeListOther[i].highlight = highlight;
                    tree.updateNode(nodeListOther[i]);
                }
            }
        }
        window.dialogInit = function(args) {
            tree = $.fn.zTree.init($("#tree"), {
                view: {
                    selectedMulti: false,
                    fontCss: getFontCss
                },
                check: {
                    "enable": true
                },
                callback: {
                    onClick: zTreeOnClick
                }
            });

            dsf.http.request(dsf.UrlSetting.design_ctrl, {
                    namespace: ""
                }, "GET")
                .done(function(response) {
                    if (response.success) {
                        var nodes = response.data;
                        fn(nodes)
                        tree.addNodes(null, nodes);
                        tree.expandAll(true)
                    }
                })
                .error(function(response) {})
                .exec();
        }

        function fn(nodes) {
            for (var i = 0; i < nodes.length; i++) {
                var node = nodes[i];
                if (node.type_value != "3" && node.type_value != "2") {
                    node.nocheck = true;
                }
                if ((node.type_value != "3" && node.type_value != "2") && !node.children) {
                    node.iconSkin = '_special';
                }
                if (node.children) {
                    fn(node.children)
                }
            }
        }
        window.getDialogResult = function() {
            var t =tree;
            var nodes = t.getCheckedNodes();
            return nodes;
        }

        function zTreeOnClick(event, treeId, treeNode) {
            window[treeId].checkNode(treeNode, !treeNode.checked);
        }
        $('#search').on('click', function(e) {
            // 搜索
            search();
        });
        $('#search_input').on('keyup', function(e) {
            // 回车搜索
            var keycode = window.event ? e.keyCode : e.which;
            if (keycode == 13) {
                search();
            }
        });

        function search() {
            updateNodes(false);
            var v = $('#search_input').val();
            if (v == '' || !v) return;
            var treeObj =tree;
            nodeList = treeObj.getNodesByParamFuzzy('name', v);
            if (nodeList.length > 0) treeObj.selectNode(nodeList[0], false, false);
            updateNodes(true, false);

            var treeObjOther =tree;
            nodeListOther = treeObjOther.getNodesByParamFuzzy('name', v);
            updateNodes(true, true);
        }

        function getFontCss(treeId, treeNode) {
            return (!!treeNode.highlight) ? {
                color: "#A60000",
                "font-weight": "bold"
            } : {
                color: "#333",
                "font-weight": "normal"
            };
        }

        function updateNodes(highlight, isOther) {
            for (var i = 0, l = nodeList.length; i < l; i++) {
                nodeList[i].highlight = highlight;
                tree.updateNode(nodeList[i]);
                if (isOther || !highlight) {
                    nodeListOther[i].highlight = highlight;
                    tree.updateNode(nodeListOther[i]);
                }
            }
        }
    </script>
</body>

</html>
