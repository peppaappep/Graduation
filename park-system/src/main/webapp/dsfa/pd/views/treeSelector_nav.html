<!DOCTYPE html>
<html lang="en" ng-app='myApp'>

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>树导航元数据选择</title>
        <link rel="stylesheet" type="text/css" href="../../../res/libs/layui/css/layui.css" />
        <link rel="stylesheet" type="text/css" href="../../../res/dsf_styles/dsf_style.css" />
        <link rel="stylesheet" type="text/css" href="../../../res/dsf_styles/font/iconfont.css" />
        <link rel="stylesheet" type="text/css" href="../res/bootstrap.min.css" />
        <link rel="stylesheet" type="text/css" href="../res/components.css" />
        <link rel="stylesheet" type="text/css" href="../../../res/libs/zTree/css/zTreeStyle/zTreeStyle.css" />
        <style>
            tr>td:first-child {
                text-align: center;
            }

            ._special_ico_docu {
                margin-right: 2px !important;
                background-position: -110px -2px;
            }

            .ztree li span.button.chk {
                margin-left: 3px
            }

            .ztree li a {
                height: 20px !important;
                line-height: 20px;
            }

            .ztree li span {
                margin-top: 1px !important;
            }

            .content {
                box-sizing: border-box;
                height: 100%;
                overflow: hidden;
                border-bottom: 1px solid #eee;
            }

            .content>div {
                max-height: 450px;
                overflow: hidden;
                padding: 10px;
            }

            .fl {
                float: left;
                width: 41%;
                height: 100%;
                border-right: 1px solid #f2f2f2;
                box-sizing: border-box;
            }

            .content>.fr {
                float: right;
                width: 59%;
                padding-right: 10px;
                overflow: auto;
            }

            .content>.fr .layui-table {
                margin: 0;
            }

            tr th:first-child,
            tr td:first-child {
                text-align: center;
            }

            .selected {
                background: #f2f2f2 !important;
                box-shadow: 0 0 10px #e2e2e2;
            }

            .ds_tree_box .ds_tree{
                padding: 0;
            }
            .layui-tab{
                margin: 0;
                position: relative;
                height: 100%;
            }
             
            .layui-tab-title{
                margin: 0;
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
            }
            .layui-tab-content{
                padding: 0;
                padding-top: 40px;
                height: 100%;
            }
            .layui-tab-item{
                height: 100%;
            }
            
            .ds_tree_box{
                height: 100%;
            }
        </style>
    </head>

    <body ng-controller='myController'>
        <div class="layui-tab layui-tab-brief" lay-filter="docDemoTabBrief">
            <ul class="layui-tab-title">
                <li ng-class="{'layui-this':TabNum==0}" ng-click='TabNum=0'>元数据</li>
                <li ng-class="{'layui-this':TabNum==1}" ng-click="TabNum=1">数据源</li>
            </ul>
            <div class="layui-tab-content">
                <div class="layui-tab-item" ng-class="{'layui-show':TabNum==0}">
                    <div class="content">
                        <div class='fl ds_tree_box'>
                            <div class="ds_tree_search">
                                <input type="text" class="layui-input" placeholder="输入名称" ng-model='searchName'
                                    ng-keyup='myKeyup($event)'>
                                <i class="search iconfont layui-icon icon-Magnifier" ng-click='search()'></i>
                            </div>
                            <div class="ds_tree">
                                <ul id="tree" class="ztree"></ul>
                            </div>
                        </div>
                        <div class="fr">
                            <table class="layui-table">
                                <thead>
                                    <tr>
                                        <th width="80">序号</th>
                                        <th>文本</th>
                                        <th>值</th>
                                    </tr>
                                </thead>
                                <tbody ng-if='data_table && data_table.length>0'>
                                    <tr ng-repeat='tr in data_table track by $index'
                                        ng-class='{"selected":chooseMetaData.id==tr.value || (chooseSmallData.length>0 && chooseSmallData[0]==tr.value)}'
                                        ng-click='selected(tr)'>
                                        <td width="80" ng-bind='$index+1'></td>
                                        <td ng-bind='tr.text'></td>
                                        <td ng-bind='tr.value'></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="layui-tab-item" ng-class="{'layui-show':TabNum==1}">
                    <div class='ds_tree_box'>
                        <div class="ds_tree_search">
                            <input type="text" class="layui-input" placeholder="输入名称" ng-model='searchName1'
                                ng-keyup='myKeyup($event)'>
                            <i class="search iconfont layui-icon icon-Magnifier" ng-click='search()'></i>
                        </div>
                        <div class="ds_tree">
                            <ul id="tree1" class="ztree"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="../../../res/libs/jquery-1.12.4.min.js"></script>
        <script src="../../../res/libs/layui/layui.all.js"></script>
        <script src="../../../res/libs/lodash/lodash.min.js"></script>
        
        <script src="../../../app.js"></script>
        <script src="../../../res/dsf_res/dsf_config.js"></script>
        <script src="../../../res/dsf_res/dsf_common.js"></script>
        <script src="../res/ds_prop.js"></script>
        <script src="../res/libs/angular/angular.min.js"></script>
        <script src="../../../dsfa/bhc/hc/bhc.js"></script>
        <script src="../../../res/libs/zTree/js/jquery.ztree.all.min.js"></script>
        <script>
            var tree = null;
            var tree1 = null;
            var nodeList = [[],[]];
            var loadedNum = 0;
            var loadingIndex = dsf.layer.loadding();
            angular.module('myApp', []).controller('myController', function ($scope) {
                $scope.chooseMetaData = {};
                $scope.chooseSmallData = [];
                $scope.TabNum = 0;
                window.dialogInit = function (args) {
                    $scope.chooseMetaData = args.value || {};
                    $scope.TabNum = $scope.chooseMetaData.TabNum || 0;
                    if ($scope.chooseMetaData.id && $scope.chooseMetaData.id.indexOf('_') != -1) {
                        $scope.chooseSmallData = $scope.chooseMetaData.id.split("_");
                    }
                    // 元数据组
                    tree = $.fn.zTree.init($("#tree"), {
                        view: {
                            selectedMulti: false,
                            fontCss: getFontCss
                        },
                        check: {
                            enable: true,
                            chkStyle: "radio",
                            radioType: "all"
                        },
                        callback: {
                            onCheck: zTreeOnCheck,
                            onClick: zTreeOnClick
                        }
                    });
                    // 数据源
                    tree1 = $.fn.zTree.init($("#tree1"), {
                        view: {
                            selectedMulti: false,
                            fontCss: getFontCss
                        },
                        check: {
                            enable: true,
                            chkStyle: "radio",
                            radioType: "all"
                        },
                        callback: {
                            onCheck: zTreeOnCheck1,
                            onClick: zTreeOnClick1
                        }
                    });
                    dsf.http.request(dsf.UrlSetting.design_metadata, {
                        namespace: ""
                    }, "GET")
                        .done(function (response) {
                            if (response.success) {
                                console.log(response)
                                fn(response.data, 0)
                                tree.addNodes(null, response.data);
                                tree.expandAll(true);
                            }
                            closeLoading();
                        })
                        .error(function (response) {

                        })
                        .exec();

                    dsf.http.request(dsf.UrlSetting.design_sqlds, {
                        namespace: ""
                    }, "GET")
                        .done(function (response) {
                            if (response.success) {
                                console.log(response)
                                fn(response.data, 1)
                                tree1.addNodes(null, response.data);
                                tree1.expandAll(true)
                            }
                            closeLoading();
                        })
                        .error(function (response) { })
                        .exec();

                    $scope.$apply();
                }
                function fn(nodes, index) {
                    for (let i = 0; i < nodes.length; i++) {
                        var node = nodes[i];
                        if (node.type_value != "3" && node.type_value != "8") {
                            node.nocheck = true;
                        }
                        if ((node.type_value != "3" && node.type_value != "8") && !node.children) {
                            node.iconSkin = '_special';
                        }
                        if (index == $scope.TabNum && (index==0 ? (node.type_value == "3" && node.ID == $scope.chooseMetaData.at) : node.dsfa_rm_id == $scope.chooseMetaData.rmId)){
                            node.checked = true;
                            zTreeOnCheck("", "", node);
                        }
                        if (node.children) {
                            fn(node.children,index)
                        }
                    }
                }
                function closeLoading() {
                    if (loadedNum > 0) {
                        dsf.layer.close(loadingIndex);

                        let treeObj = $scope.TabNum == 0 ? tree : tree1;
                        let node = null;
                        if ($scope.chooseMetaData.at) {
                            node = treeObj.getNodesByParam('ID', $scope.chooseMetaData.at);
                        }else if($scope.chooseMetaData.rmId){
                            node = treeObj.getNodesByParam('dsfa_rm_id', $scope.chooseMetaData.rmId);
                            $scope.chooseMetaData.dsfa_rm_id = $scope.chooseMetaData.rmId;
                        }
                        if (node && node.length > 0) {
                            setTimeout(function () {
                                treeObj.selectNode(node[node.length - 1], false, false);
                            }, 500)
                        }
                    } else {
                        loadedNum++;
                    }
                }

                $scope.selected = function (tr) {
                    if (tr.data.valueAttributes.length > 1) {
                        window.parent.dsf.layer.openDialog({
                            title: "请选择",
                            content: '../views/treeSelector_small.html',
                            area: ['500px', '550px'],
                            args: { data: tr, choose: $scope.chooseMetaData },
                            btn: [{
                                text: "确定",
                                handler: function (index, layero) {
                                    let frame = layero.find("iframe");
                                    let win = frame.get(0).contentWindow;
                                    let result = win.getDialogResult();
                                    $scope.chooseMetaData = result;
                                    $scope.chooseSmallData = $scope.chooseMetaData.id.split("_");
                                    console.log(result)
                                    $scope.$apply();
                                }
                            }, {
                                text: "取消",
                                handler: function (index, layero) {
                                }
                            }]
                        });
                    } else {
                        $scope.chooseSmallData = [];
                        $scope.chooseMetaData = tr.data;
                    }
                }

                window.getDialogResult = function () {
                    if ($scope.TabNum==0){
                        if($scope.chooseMetaData.id) {
                            $scope.chooseMetaData.TabNum = $scope.TabNum;
                            return $scope.chooseMetaData;
                        } else {
                            dsf.layer.message("请选择元数据组", 5);
                            return false;
                        }
                    }else if($scope.chooseMetaData.dsfa_rm_id){
                        return {
                            rmId : $scope.chooseMetaData.dsfa_rm_id,
                            TabNum : $scope.TabNum
                        }
                    }else{
                        dsf.layer.message("请选择数据源", 5);
                        return false;
                    }
                }

                function zTreeOnCheck(event, treeId, treeNode) {
                    let d = treeNode;

                    let items = [];
                    for (let k in d.metadata) {
                        items.push({
                            "text": d.metadata[k].name,
                            "value": d.metadata[k].id,
                            "data": d.metadata[k]
                        });
                    }
                    items = items.sort((v1, v2) => {
                        let order1 = v1.data.order ? parseInt(v1.data.order) : 0;
                        let order2 = v2.data.order ? parseInt(v2.data.order) : 0;
                        if (order1 < order2) {
                            return -1;
                        }
                        else {
                            return 1;
                        }
                    });
                    $scope.data_table = items;
                    $scope.$apply();
                }

                function zTreeOnClick(event, treeId, treeNode) {
                    tree.checkNode(treeNode, true);
                    zTreeOnCheck(event, treeId, treeNode);
                }
                function zTreeOnClick1(event, treeId, treeNode){
                    tree1.checkNode(treeNode, true);
                    zTreeOnCheck1(event, treeId, treeNode);
                }
                function zTreeOnCheck1(event, treeId, treeNode){
                    $scope.chooseMetaData.dsfa_rm_id = treeNode.dsfa_rm_id;
                }

                $scope.search = function () {
                    updateNodes(false);
                    let treeObj = ($scope.TabNum == 0 ? tree : tree1);
                    let v = ($scope.TabNum == 0 ? $scope.searchName : $scope.searchName1);
                    if (v == '' || !v) return;

                    nodeList[$scope.TabNum] = treeObj.getNodesByParamFuzzy('name', v);
                    if (nodeList[$scope.TabNum].length > 0) treeObj.selectNode(nodeList[$scope.TabNum][0], false, false);
                    updateNodes(true);
                }

                $scope.myKeyup = function (e) {
                    var keycode = window.event ? e.keyCode : e.which;
                    if (keycode == 13) {
                        $scope.search();
                    }
                };
                function getFontCss(treeId, treeNode) {
                    return (!!treeNode.highlight) ? { color: "#A60000", "font-weight": "bold" } : { color: "#333", "font-weight": "normal" };
                }
                function updateNodes(highlight) {
                    for (var i = 0, l = nodeList[$scope.TabNum].length; i < l; i++) {
                        nodeList[$scope.TabNum][i].highlight = highlight;
                        let treeObj = $scope.TabNum == 0 ? tree : tree1;
                        treeObj.updateNode(nodeList[$scope.TabNum][i]);
                    }
                }
            })

        </script>
    </body>

</html>
