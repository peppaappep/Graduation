<!DOCTYPE html>
<html lang="en" ng-app="myApp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <!-- <link rel="stylesheet" type="text/css" href="../../../res/libs/layui/css/layui.css" /> -->
    <link rel="stylesheet" type="text/css" href="../../../res/dsf_styles/dsf_style.css" />
    <link rel="stylesheet" type="text/css" href="../../../res/dsf_styles/font/iconfont.css" />
    <link rel="stylesheet" type="text/css" href="../res/bootstrap.min.css" />
    <link rel="stylesheet" type="text/css" href="../res/components.css" />
    <link rel="stylesheet" type="text/css" href="../res/libs/uniform/css/uniform.default.min.css" />
    <style>
        body {
            background-color: #F2F2F2;
        }
        
        .layui-anim-upbit {
            z-index: 999999999999999 !important;
        }
        
        div.layui-table-cell {
            overflow: visible;
        }
        
        #card1,
        #card2,
        #card3 {
            display: none;
        }
    </style>
</head>

<body ng-controller="dataSourceController">
    <div class="container-fluid dialog_container" style="background-color: #fff;height:100%;">
        <form id="baseForm">
            <div class="form-group">
                <label for="sel_type">请求类型</label>
                <select id="sel_type" class="form-control" ng-model="data.type">
                    <option value="general">常规</option>
                    <option value="dictionary">字典</option>
                </select>
            </div>
            <div ng-if="data.type=='general'">
                <div class="form-group">
                    <label for="txt_express">请求路径</label>
                    <input type="text" id="txt_url" class="form-control" placeholder="{{config.defaultSetting.express}}" ng-model="data.express"  autocomplete="off" />
                </div>
            </div>
            <div ng-if="data.type=='dictionary'">
                <div class="form-group">
                    <label for="txt_express">字典名称</label>
                    <input type="text" id="txt_name" class="form-control" ng-model="data.express" placeholder="" autocomplete="off" />
                </div>
            </div>
            <div>
                <label class="layui-form-label">请求方式</label>
                <div>
                    <label><input type="radio" name="request" value="init" ng-model="data.request"/>初始化统一请求</label>&nbsp;&nbsp;
                    <label><input type="radio" name="request" value="independent" ng-model="data.request"/>独立请求</label>
                </div>
            </div>
        </form>
    </div>
    <script src="../../../res/libs/jquery-1.12.4.min.js"></script>
    <script src="../../../res/libs/layui/layui.all.js"></script>
    <script src="../../../res/libs/lodash/lodash.min.js"></script>
    <script src="../../../app.js"></script>
    <script src="../../../res/dsf_res/dsf_config.js"></script>
    <script src="../../../res/dsf_res/dsf_common.js"></script>
    <script src="../res/ds_prop.js"></script>
    <script src="../res/libs/angular/angular.min.js"></script>

    <script>
        var app = angular.module('myApp', []);
        var dialogArgs = {};
        app.controller('dataSourceController', function($scope) {
            $scope.args = null;
            window.dialogInit = function(args) {
                $scope.args = $.extend(true, {}, args);
                $scope.data = $scope.args.value;
                $scope.config=$scope.args.attr.config;
                $scope.$apply();
            }
            window.getDialogResult = function() {
                if(!$scope.data.express){
                    $scope.data.express=$scope.config.defaultSetting.express;
                }
                return $scope.args.value;
            }
        })
    </script>

</body>

</html>
