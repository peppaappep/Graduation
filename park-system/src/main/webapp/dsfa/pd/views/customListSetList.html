<!DOCTYPE html>
<html lang="en" ng-app="myApp" ng-controller="navTreeEditController">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta http-equiv="X-UA-Compatible" content="ie=edge">
		<title>自定义列表行设置</title>
		<link rel="stylesheet" type="text/css" href="../../../res/libs/layui/css/layui.css" />
		<link rel="stylesheet" type="text/css" href="../../../res/dsf_styles/dsf_style.css" />
		<link rel="stylesheet" type="text/css" href="../../../res/dsf_styles/font/iconfont.css" />
		<link rel="stylesheet" type="text/css" href="../res/bootstrap.min.css" />
		<link rel="stylesheet" type="text/css" href="../res/components.css" />
		<style>
			body {
				box-sizing: border-box;
				position: relative;
				padding-top: 218px !important;
			}
			th {
				text-align: center;
			}
			.layui-form-label{
				width: 145px;
				text-align: left;
			}
			.layui-input-block{
				margin-left: 145px;
			}
			.layui-input-inline{
				width: 297px !important;
			}
			.layui-inline.type{
				margin-right: 0;
				float: right;
			}
			.layui-inline.type .layui-input-inline{
				margin: 0;
			}
			.ds_button .iconfont {
			    vertical-align: middle;
			}
			.top{
				position: absolute;
				top: 20px;
				left: 20px;
				right: 20px;
			}
			.bottom{
				height: 100%;
				overflow: auto;
				padding: 0 20px 0;
			}
			.layui-form-item {
			    margin-bottom: 5px;
			}
		</style>
	</head>

	<body>
		<div class="top">
			<form class="layui-form" action="">
				<div class="layui-form-item">
					<div class="layui-inline">
						<label class="layui-form-label">列表高亮字段：</label>
						<div class="layui-input-inline">
							<input type="text" name="title" placeholder="字段值为true时高亮(支持表达式)" class="layui-input" ng-model='args.value.lightCode'>
						</div>
					</div>
					<div class="layui-inline type">
						<label class="layui-form-label">跳转链接打开类型：</label>
						<div class="layui-input-inline">
							<input type="text" name="title" placeholder="true:新窗口 false:弹框 (支持表达式)" class="layui-input" ng-model='args.value.linkType'>
						</div>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">跳转链接字段：</label>
					<div class="layui-input-block">
						<input type="text" name="title" placeholder="字段有值时跳转(支持表达式)" class="layui-input" ng-model='args.value.linkCode'>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">查看更多数据链接：</label>
					<div class="layui-input-block">
						<input type="text" name="title" placeholder="设置后显示更多(支持表达式)" class="layui-input" ng-model='args.value.moreUrl'>
					</div>
				</div>
			</form>
			<div class="layui-row" style="margin-top: 10px;">
				<div class="layui-col-xs12" style="text-align: right">
					<a class="ds_button" ng-click="add()"><i class="iconfont icon-icon_tianjia"></i>新增</a>
					<a class="ds_button ds_button_auxiliary" ng-click='args.value.list=[]'><i class="iconfont icon-delete"></i>清空</a>
				</div>
			</div>
		</div>
		<div class="bottom">
			<table id="table" class="layui-table" style="margin: 0;">
				<thead>
					<tr>
						<th>序号</th>
						<th>字段描述</th>
						<th>对应字段</th>
						<th>显示标题</th>
						<th>数据格式</th>
						<th>宽度</th>
						<th>一行显示</th>
						<th>操作</th>
					</tr>
				</thead>
				<tbody>
					<tr ng-repeat="v in args.value.list">
						<td width="60px" style='text-align: center;' ng-bind='$index+1'></td>
						<td width="170px">
							<!-- <div ng-bind='v.des'></div> -->
							<input class="form-control" ng-model="v.des" />
						</td>
						<td>
							<input class="form-control" ng-model="v.code" />
						</td>
						<td>
							<input class="form-control" ng-model="v.title" />
						</td>
						<td width="110px">
							<select class="form-control" ng-model="v.text">
								<option value="textCenter">居中</option>
								<option value="textLeft">居左</option>
								<option value="textRight">居右</option>
							</select>
						</td>
						<td width="100px">
							<input class="form-control" ng-model="v.width" />
						</td>
						<td width="100px">
							<select class="form-control" ng-model="v.ellipsis">
								<option value="0">否</option>
								<option value="1">是</option>
							</select>
						</td>
						<td width="130px">
							<a ng-click='sort(v,"up",$index)' ng-show='$index>0'>上移</a>
							<a ng-click='sort(v,"down",$index)' ng-show='$index<args.value.list.length-1'>下移</a>
							<a ng-click='deleteItem($index)'>删除</a>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
		<script src="../../../res/libs/jquery-1.12.4.min.js"></script>
		<script src="../../../res/libs/layui/layui.all.js"></script>
		<script src="../../../res/libs/lodash/lodash.min.js"></script>
		<script src="../../../app.js"></script>
		<script src="../../../res/dsf_res/dsf_config.js"></script>
		<script src="../../../res/dsf_res/dsf_common.js"></script>
		<script src="../res/ds_prop.js"></script>
		<script src="../res/libs/angular/angular.min.js"></script>
		<script>
			var app = angular.module('myApp', []);
			app.controller('navTreeEditController', function($scope) {
				$scope.args = {
					value: {}
				}

				window.dialogInit = function(args) {
					$scope.args = $.extend(true, {}, args);
					$scope.$apply();
				}

				window.getDialogResult = function() {
					return $scope.args.value;
				}

				$scope.sort = function(item, type, index) {
					if (type == "up") {
						var prev = $scope.args.value.list[index - 1];
						$scope.args.value.list[index - 1] = item;
						$scope.args.value.list[index] = prev;
					} else {
						var next = $scope.args.value.list[index + 1];
						$scope.args.value.list[index + 1] = item;
						$scope.args.value.list[index] = next;
					}
				}

				$scope.deleteItem = function(index) {
					$scope.args.value.list.splice(index, 1);
				}

				$scope.add = function() {
					$scope.args.value.list.push({
						des: '',
						width: '100%',
						text: 'textLeft',
						ellipsis: '1',
						code: null
					});
				}
			});
		</script>
	</body>

</html>
