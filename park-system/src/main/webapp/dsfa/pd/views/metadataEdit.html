<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="../../../res/libs/layui/css/layui.css" />
    <link rel="stylesheet" type="text/css" href="../../../res/dsf_styles/dsf_style.css" />
    <link rel="stylesheet" type="text/css" href="../../../res/dsf_styles/font/iconfont.css" />
    <!-- <link  rel="stylesheet" type="text/css"  href="../res/bootstrap.min.css"/>
    <link rel="stylesheet" type="text/css" href="../../../res/libs/datatables/css/jquery.dataTables.min.css" />
    <link rel="stylesheet" type="text/css" href="../../../res/libs/datatables/css/dataTables.bootstrap.min.css" /> -->
    <style>
        body {
            background-color: #F2F2F2;
        }
        
        .layui-anim-upbit {
            z-index: 999999999999999 !important;
        }
        
        div.layui-table-cell {
            overflow: visible;
        }

        #card1,#card2,#card3{
            display:none;
        }
    </style>
</head>

<body>
    <div class="layui-container" style="padding-top:10px;padding-bottom:10px;">
        <div class="layui-card" id="card1">
            <div class="layui-card-header">基本设置</div>
            <div class="layui-card-body">
                <form class="layui-form" id="baseForm" lay-filter="base">
                    <div class="layui-form-item">
                        <label class="layui-form-label">标识：</label>
                        <div class="layui-input-block">
                            <input type="text" name="id" placeholder="自动生成,规则：业务名称_模块名称[_子表标识].组件标识" readonly autocomplete="off" class="layui-input" />
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">标识简称：</label>
                        <div class="layui-input-block">
                            <input type="text" name="code" placeholder="自动生成,规则：组件标识" readonly autocomplete="off" class="layui-input" />
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">名称：</label>
                        <div class="layui-input-block">
                            <input type="text" name="name" placeholder="名称" autocomplete="off" class="layui-input" />
                        </div>
                    </div>
                    <div class="layui-form-item" id="defaultValueItem">
                        <label class="layui-form-label">默认值：</label>
                        <div class="layui-input-block">
                            <input type="text" name="defaultValue" placeholder="控件在业务中显示的默认值，可以是一个表达式" autocomplete="off" class="layui-input" />

                        </div>
                    </div>
                </form>
            </div>
        </div>
        <div class="layui-card" id="card2">
            <div class="layui-card-header">校验规则</div>
            <div class="layui-card-body">
                <form class="layui-form" id="validateForm" lay-filter="validate">
                    <div class="layui-form-item">
                        <label class="layui-form-label">是否必填：</label>
                        <div class="layui-input-block">
                            <input type="radio" name="required" value="1" title="是" />
                            <input type="radio" name="required" value="0" title="否" checked />
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">验证规则：</label>
                        <div class="layui-input-block">
                            <input type="radio" name="type" value="0" title="无" checked/>
                            <input type="radio" name="type" value="1" title="正则表达式" />
                            <input type="radio" name="type" value="2" title="函数" />
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">表达式：</label>
                        <div class="layui-input-block">
                            <input type="text" name="express" placeholder="正则表达式/函数" autocomplete="off" class="layui-input" />
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">最小值：</label>
                        <div class="layui-input-block">
                            <input type="text" name="min" placeholder="文本类型为最小字符长度/数字类型为最小数值" autocomplete="off" class="layui-input" />
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">最大值：</label>
                        <div class="layui-input-block">
                            <input type="text" name="max" placeholder="文本类型为最大字符长度/数字类型为最大数值" autocomplete="off" class="layui-input" />
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <div class="layui-card" id="card3">
            <div class="layui-card-header">值属性</div>
            <div class="layui-card-body">
                <table id="table" lay-filter="table" class="table table-striped table-bordered dataTable no-footer">
                </table>
            </div>
        </div>
    </div>
    <script src="../../../res/libs/jquery-1.12.4.min.js"></script>
    <script src="../../../res/libs/layui/layui.all.js"></script>
    <script src="../../../res/libs/lodash/lodash.min.js"></script>
    <script src="../../../app.js"></script>
    <script src="../../../res/dsf_res/dsf_config.js"></script>
    <script src="../../../res/dsf_res/dsf_common.js"></script>
    <script src="../res/ds_prop.js"></script>
    <script src="../hc/control_mm_map.js"></script>
    <!-- <script src="../../../res/libs/datatables/js/jquery.dataTables.min.js"></script>
    <script src="../../../res/libs/datatables/js/dataTables.bootstrap.min.js"></script> -->
    <script>
        let table = layui.table;
        let dialogArgs = null;
        let data = {
            "id": "",
            "name": "",
            "code": "",
            "type": 1,
            "at": "",
            "controls": [],
            "detaultValue": null,
            "validate": {
                "required": "0",
                "type": "0",
                "express": "",
                "min": null,
                "max": null
            },
            "valueAttributes": []
        }
        window.dialogInit = function(args) {
            dialogArgs = args;
            if (!args.value.name && args.owner.label) {
                args.value.name = args.owner.label;
            }
            if(args.value.type=="1"){
                $("#card1").show();
                $("#card2").show();
                $("#card3").show();
            }else{
                $("#card1").show();
                $("#defaultValueItem").hide();
            }
            loadData(args.value);
            initTable();
            loadTable();
        }

        function loadData(args) {
            if (args) {
                data.id = args.id;
                data.name = args.name;
                data.code = args.code;
                data.type = args.type;
                data.at = args.at;
                data.controls = args.controls;
                //基本
                data.defaultValue = args.defaultValue;
                
                //绑定验证数据
                data.validate.required = args.validate.required ? "1" : "0";
                data.validate.express = args.validate.express;
                data.validate.type = args.validate.type;
                data.validate.max = args.validate.max;
                data.validate.min = args.validate.min;

                //值属性
                data.valueAttributes = $.extend(true, [], args.valueAttributes);
            }
            layui.form.render(null);
            layui.form.val("base", {
                "id": data.id,
                "code": data.code,
                "name": data.name,
                "defaultValue": data.defaultValue
            })
            layui.form.val("validate", data.validate);
        }

        function initTable() {
            // $("#table").DataTable(dsf.dtConfig);
            table.render({
                elem: '#table',
                size: 'lg',
                height: 300,
                cols: [
                    [{
                        field: 'name',
                        title: '描述',
                        width: 100
                    }, {
                        field: 'code',
                        title: '标识',
                        width: 100
                    }, {
                        field: 'type',
                        title: '数据类型',
                        width: 100,
                        templet: '#typeTpl'
                    }, {
                        field: 'length',
                        title: '数据长度',
                        width: 100,
                        edit: 'text'
                    }, {
                        field: 'defaultValue',
                        title: '默认值',
                        width: 100,
                        edit: 'text'
                    }]
                ],
                limit: 9999
            });

            layui.form.on('select(select_type)', function(obj) {
                var index = $(obj.elem).attr("index");
                data.valueAttributes[index].type = obj.value;
            });
            table.on('edit(table)', function(obj) {
                var value = obj.value;
                var rowdata = obj.data;
                var field = obj.field;
                let rowData = data.valueAttributes[obj.data.LAY_TABLE_INDEX];
                rowData[field] = obj.value;
            });
        }

        function loadTable() {
            table.reload("table", {
                "data": data.valueAttributes
            });
        }
        window.updateForm = function(args) {
            var newArgs = $.extend({}, args);
            loadData(newArgs);
            loadTable();

        }
        window.getDialogResult = function() {
            var result = {};
            var baseForm = $("#baseForm");
            var validateForm = $("#validateForm");
            result.id = data.id;
            result.code = data.code;
            result.name = baseForm.find("input[name=name]").val();
            result.type = data.type;
            result.at = data.at;
            result.controls = data.controls;
            result.defaultValue = baseForm.find("input[name=defaultValue]").val();
            result.validate = {};
            result.validate.required = validateForm.find("input[name=required]:checked").val() == "1" ? true : false;
            result.validate.type = validateForm.find("input[name=type]:checked").val();
            result.validate.express = validateForm.find("input[name=express]").val();
            result.validate.min = validateForm.find("input[name=min]").val();
            result.validate.max = validateForm.find("input[name=max]").val();

            result.valueAttributes = data.valueAttributes;
            if (!$.trim(result.name)) {
                dsf.layer.message("请填写名称", 5);
                return false;
            }
            if (result.validate.type == "1" || result.validate.type == "2") {
                if (!$.trim(result.validate.express)) {
                    dsf.layer.message("请填写表达式", 5);
                    return false;
                }
            }
            if (result.valueAttributes) {
                for (var i = 0; i < result.valueAttributes.length; i++) {
                    var r = result.valueAttributes[i];
                    var num_lengthReg = /^\d+(,\d+)?$/g;
                    let other_lengthReg = /^(\d+)$/g;
                    if (r.type == "string") {
                        if (!$.trim(r.length)) {
                            dsf.layer.message("数据类型为文本时，长度不可以为空", 5);
                            return false;
                        } else {
                            if (!other_lengthReg.test(r.length)) {
                                dsf.layer.message("长度格式不正确", 5);
                                return false;
                            }
                        }
                    }
                    if (r.type == "number") {
                        if (!$.trim(r.length)) {
                            dsf.layer.message("数据类型为数字，长度不可以为空", 5);
                            return false;
                        } else {
                            if (!num_lengthReg.test(r.length)) {
                                dsf.layer.message("长度格式不正确", 5);
                                return false;
                            }
                        }
                    }
                }
            }
            return result;
        }
    </script>
    <script type="text/html" id="typeTpl">
        <select name="dataType" lay-filter="select_type" index='{{d.LAY_TABLE_INDEX}}'>
            <option value="string" {{d.type == 'string' ? 'selected' : ''}}>文本</option>
            <option value="number" {{d.type == 'number' ? 'selected' : ''}}>数字</option>
            <option value="date" {{d.type == 'date' ? 'selected' : ''}}>日期</option>
            <option value="object" {{d.type == 'object' ? 'selected' : ''}}>对象</option>
        </select>
    </script>
</body>

</html>
