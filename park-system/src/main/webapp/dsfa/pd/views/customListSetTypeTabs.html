<!DOCTYPE html>
<html lang="en" ng-app="myApp">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta http-equiv="X-UA-Compatible" content="ie=edge">
		<title>自定义列表-设置分类Tab</title>
		<link rel="stylesheet" type="text/css" href="../../../res/libs/layui/css/layui.css" />
		<link rel="stylesheet" type="text/css" href="../../../res/dsf_styles/dsf_style.css" />
		<link rel="stylesheet" type="text/css" href="../../../res/dsf_styles/font/iconfont.css" />
		<link rel="stylesheet" type="text/css" href="../res/bootstrap.min.css" />
		<link rel="stylesheet" type="text/css" href="../res/components.css" />
		<style>
			.error {
            border: 1px solid red;
        }
        
        .form-control {
            box-sizing: border-box;
            width: 100%;
            min-height: 30px;
            padding-left: 5px;
            padding-right: 5px;
        }
        
        table>tbody td {
            padding: 5px !important;
        }
		img{
			width: 20px;
			padding: 0 5px;
			cursor: pointer;
		}
		
		.ds_button .iconfont {
		    vertical-align: middle;
		}
    </style>
	</head>

	<body ng-controller="myCtrl">
		<div style="width:100%;position:fixed;top:0px;background-color:#fff;z-index:10">
			<div class="layui-row">
				<div class="layui-col-xs12" style="padding:10px;text-align: right">
					<a class="ds_button" ng-click="add()"><i class="iconfont icon-icon_tianjia"></i>新增</a>
					<a class="ds_button" ng-click="toChoose()"><i class="iconfont icon-fangda"></i>选择</a>
					<a class="ds_button ds_button_auxiliary" ng-click='args.value=[]'><i class="iconfont icon-delete"></i>清空</a>
				</div>
			</div>
		</div>
		<div style="margin-top:58px;padding:10px;">
			<div class="row">
				<div class="col-xs-12">
					<table id="table" class="layui-table">
						<thead>
							<tr>
								<th style="text-align: center">序号</th>
								<th style="text-align: center">分类名称</th>
								<th style="text-align: center">图片类型</th>
								<th style="text-align: center">图标class/图片地址</th>
								<th style="text-align: center">接口地址</th>
								<th style="text-align: center">操作</th>
							</tr>
						</thead>
						<tbody>
							<tr ng-repeat="item in args.value">
								<td style="width:60px;text-align:center">{{$index+1}}</td>
								<td style="width:110px">
									<input name="text_{{$index}}" class="form-control" type="text" ng-model="item.text">
								</td>
								<td style="width:100px">
									<select name="isImage_{{$index}}" class="form-control" ng-model="item.isImage">
										<option value='0'>图标</option>
										<option value='1'>图片</option>
									</select>
								</td>
								<td>
									<input name="pic_{{$index}}" class="form-control" type="text" ng-model="item.pic">
								</td>
								<td>
									<input name="url_{{$index}}" class="form-control" type="text" ng-model="item.url">
								</td>
								<td style="width:200px;vertical-align: middle;text-align: center;">
									<a ng-click='setList(item,$index)'>列表编辑</a>
									<a ng-show='$index>0' ng-click='sort(item,"up",$index)'>上移</a>
									<a ng-show='$index<args.value.length-1' ng-click='sort(item,"down",$index)'>下移</a>
									<a ng-click='deleteItem($index)'>删除</a>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
		<script src="../../../res/libs/jquery-1.12.4.min.js"></script>
		<script src="../../../res/libs/layui/layui.all.js"></script>
		<script src="../../../res/libs/lodash/lodash.min.js"></script>
		<script src="../../../app.js"></script>
		<script src="../../../res/dsf_res/dsf_config.js"></script>
		<script src="../../../res/dsf_res/dsf_common.js"></script>
		<script src="../res/ds_prop.js"></script>
		<script src="../res/libs/angular/angular.min.js"></script>
		<script>
			var app = angular.module('myApp', []);
			var dialogArgs = {};
			app.controller('myCtrl', function($scope) {
				$scope.args = {
					value: []
				}
				window.dialogInit = function(args) {
					$scope.args = $.extend(true, {}, args);
					$scope.$apply();
				}
				$scope.add = function() {
					$scope.args.value.push({
						text: null,
						isImage: '0',
						pic: null,
						url: $scope.args.owner.url,
						loaded: false,
						list: $.extend(true, [], $scope.args.owner.title.list),
						lightCode: null,
						linkCode: null
					});
				}
				$scope.toChoose = function() {
					dsf.layer.openDialog({
						title: '选择',
						content: dsf.url.getWebPath("dsfa/pd/views/enumEditor.html?onlyDict=1"),
						area: ['850px', '550px'],
						args: {
							value: {
								type: 'dict'
							}
						},
						btn: [{
							text: "确定",
							handler: function(index, layero) {
								var frame = layero.find("iframe");
								let win = frame.get(0).contentWindow;
								let result = win.getDialogResult();
								if (result.length > 0) {
									_.forEach(result, function(item, i) {
										$scope.args.value.push({
											text: item.text,
											value: item.value,
											isImage: '0',
											pic: null,
											url: null,
											loaded: false,
											list: $.extend(true, [], $scope.args.owner.title.list),
											lightCode: null,
											linkCode: null
										})
									})
									$scope.$apply();
								}
							}
						}, {
							text: "取消",
							handler: function(index, layero) {}
						}]
					});
				}
				$scope.setList = function(item,i){
					dsf.layer.openDialog({
						title:"列表编辑",
						content: dsf.url.getWebPath("dsfa/pd/views/customListSetList.html"),
						area: ['1000px', '600px'],
						args: {
							value: item
						},
						btn: [{
							text: "确定",
							handler: function(index, layero) {
								var frame = layero.find("iframe");
								let win = frame.get(0).contentWindow;
								let result = win.getDialogResult();
								$scope.args.value[i] = result;
								$scope.$apply()
							}
						}, {
							text: "取消",
							handler: function(index, layero) {}
						}]
					});
				}
				$scope.deleteItem = function(index) {
					$scope.args.value.splice(index, 1);
				}
				$scope.sort = function(item, type, index) {
					if (type == "up") {
						var prev = $scope.args.value[index - 1];
						$scope.args.value[index - 1] = item;
						$scope.args.value[index] = prev;
					} else {
						var next = $scope.args.value[index + 1];
						$scope.args.value[index + 1] = item;
						$scope.args.value[index] = next;
					}
				}

				window.getDialogResult = function() {
					return $scope.args.value;
				}
			});
		</script>
	</body>

</html>
