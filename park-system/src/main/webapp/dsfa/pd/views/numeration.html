<!DOCTYPE html>
<html lang="en" ng-app="myApp">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta http-equiv="X-UA-Compatible" content="ie=edge">
		<title>设置编号规则</title>
		<link rel="stylesheet" type="text/css" href="../../../res/libs/layui/css/layui.css" />
		<link rel="stylesheet" type="text/css" href="../../../res/dsf_styles/dsf_style.css" />
		<link rel="stylesheet" type="text/css" href="../../../res/dsf_styles/bhc.css" />
		<link rel="stylesheet" type="text/css" href="../../../res/dsf_styles/font/iconfont.css" />
		<style>
			body {
				padding: 0 10px;
				box-sizing: border-box;
			}
		</style>
	</head>

	<body>
		<table id='tb'></table>
		<script src="../../../res/libs/jquery-1.12.4.min.js"></script>
		<script src="../../../res/libs/layui/layui.all.js"></script>
		<script src="../../../res/libs/lodash/lodash.min.js"></script>
		<script src="../../../app.js"></script>
		<script src="../../../res/dsf_res/dsf_config.js"></script>
		<script src="../../../res/dsf_res/dsf_common.js"></script>
		<script src="../res/ds_prop.js"></script>
		<script>
			window.dialogInit = function(args) {
				var param = {
					pageNum: 1,
					pageSize: 1000,
					namespace: "dsfa.number.rule",
					pageName: "list",
				}
				var loadIndex = dsf.layer.loadding();
				dsf.http.request(dsf.url.getWebPath("meta/list/data"), param, "GET")
					.done(function(response) {
						var data = response.data;
						if (args.value && args.value['dsfa_number_rule.dsfa_number_rule_id']) {
							for (var i = 0; data.length > i; i++) {
								if (data[i]["_id"] == args.value['dsfa_number_rule.dsfa_number_rule_id']) {
									data[i]['LAY_CHECKED'] = true;
									break;
								}
							}
						}
						if (response.success) {
							layui.table.render({
								elem: '#tb',
								cols: [
									[{
										type: 'radio'
									}, {
										field: 'dsfa_number_rule.name',
										title: '规则名称'
									}]
								],
								data: data,
								limit: 1000
							});
						} else {
							dsf.layer.message(response.message || '服务器异常', false);
						}
					})
					.error(function(response) {
						dsf.layer.message('服务器异常', false);
					})
					.always(function() {
						dsf.layer.close(loadIndex);
					})
					.exec();
			}

			window.getDialogResult = function() {
				var data = layui.table.checkStatus('tb').data;
				if (data.length == 0 || data.length > 1) {
					dsf.layer.message("请选择一个编号规则", false);
					return false;
				} else {
					return data[0]
				}
			}
		</script>
	</body>
</html>
