<!DOCTYPE html >
<html lang="en" ng-app="myApp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>背景配置</title>
    <link rel="stylesheet" type="text/css" href="../../../res/libs/layui/css/layui.css" />
    <link rel="stylesheet" type="text/css" href="../../../res/dsf_styles/dsf_style.css" />
    <link rel="stylesheet" type="text/css" href="../../../res/dsf_styles/font/iconfont.css" />
    <link rel="stylesheet" type="text/css" href="../../../res/libs/zTree/css/zTreeStyle/zTreeStyle.css" />
    <style>
        .box {
            padding: 20px 20px 0 10px;
        }
    </style>
</head>

<body ng-controller="dataGridColumnEdit">
    <div class="box">
        <form class="layui-form">
            <div class="layui-form-item">
                <label class="layui-form-label">背景色</label>
                <div class="layui-input-block">
                    <input type="text" name="title" required lay-verify="required" ng-model="background.color" placeholder="支持#000000或rgb(0,0,0)" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">背景图路径</label>
                <div class="layui-input-block">
                    <input type="text" name="title" required lay-verify="required" ng-model="background.image" placeholder="请输入图片路径url" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">背景图位置</label>
                <div class="layui-input-block">
                    <input type="text" name="title" required lay-verify="required" ng-model="background.position" placeholder="背景图起始坐标，格式：top left" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">背景图尺寸</label>
                <div class="layui-input-block">
                    <input type="text" name="title" required lay-verify="required" ng-model="background.size" placeholder="请输入尺寸，写法示例:100px 100px" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">背景图平铺</label>
                <div class="layui-input-block">
                    <select name="repeat" lay-filter="repeat" v-model="background.repeat">
                        <option value="no-repeat">不重复</option>
                        <option value="repeat">重复</option>
                        <option value="repeat-x">沿x轴重复</option>
                        <option value="repeat-y">沿y轴重复</option>
                    </select>
                </div>
            </div>
        </form>
    </div>
    <script src="../../../res/libs/jquery-1.12.4.min.js"></script>
    <script src="../../../res/libs/layui/layui.all.js"></script>
    <script src="../../../res/libs/lodash/lodash.min.js"></script>
    <script src="../../../app.js"></script>
    <script src="../../../res/dsf_res/dsf_config.js"></script>
    <script src="../../../res/dsf_res/dsf_common.js"></script>
    <script src="../res/ds_prop.js"></script>
    <script src="../res/libs/angular/angular.min.js"></script>
    <script src="../../../res/libs/zTree/js/jquery.ztree.all.min.js"></script>
    <script>
        var app = angular.module('myApp', []);
        var dialogArgs = {};

        app.controller('dataGridColumnEdit', function($scope) {
            $scope.args = null;
            window.dialogInit = function(args) {
                $scope.args = $.extend(true, {}, args);
                $scope.background = args.value;
                $scope.$apply();

                //绑定layui下拉框
                layui.form.on('select(repeat)', function(data) {
                    $scope.background.repeat=data.value;
                    console.log(data.elem); //得到select原始DOM对象
                    console.log(data.value); //得到被选中的值
                    console.log(data.othis); //得到美化后的DOM对象
                });
            }

            window.getDialogResult = function() {
                return $scope.background
            }
        });
    </script>
</body>

</html>
