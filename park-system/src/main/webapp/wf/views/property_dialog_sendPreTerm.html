<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>发送前置条件</title>
		<link rel="stylesheet" type="text/css" href="../../res/libs/layui/css/layui.css" />
		<link rel="stylesheet" type="text/css" href="../../res/dsf_styles/dsf_style.css" />
		<link rel="stylesheet" type="text/css" href="../../res/dsf_styles/font/iconfont.css" />
		<style type="text/css">
			.sendPreTerm{
				padding: 10px;
			}
			.sendPreTerm .bottom{
				position: relative;
			}
			.sendPreTerm .layui-input-block{
				margin-left: 0;
			}
			.sendPreTerm .myleft{
				width: 61%;
				padding: 10px 0 0;
				box-sizing: border-box;
				margin: 0;
			}
			.sendPreTerm .ul-box{
				position: absolute;
				top: 10px;
				right: 0;
				width: 38%;
				bottom: 0;
				border: 1px solid #e6e6e6;
			}
			.sendPreTerm .layui-form-label{
				width: auto;
				padding: 9px 0 !important;
			}
		</style>
	</head>
	<body class="sendPreTerm">
		<form class="layui-form" action="" lay-filter="example">
			<div class="bottom">
				<div class="myleft layui-form-item">
					<div class="layui-form-item layui-form-text">
						<div class="layui-input-block">
							<textarea rows="8" name="desc" placeholder="请输入" class="layui-textarea"></textarea>
						</div>
					</div>
				</div>
				<div class="ul-box">
					<ul></ul>
				</div>
			</div>
			<div class="layui-form-item">
				<div class="layui-inline">
					<label class="layui-form-label">类：</label>
					<div class="layui-input-inline">
						<input type="tel" name="phone" lay-verify="required|phone" autocomplete="off" class="layui-input">
					</div>
				</div>
				<div class="layui-inline">
					<label class="layui-form-label">方法：</label>
					<div class="layui-input-inline">
						<input type="text" name="email" lay-verify="email" autocomplete="off" class="layui-input">
					</div>
				</div>
			</div>
			<div class="layui-form-item">
				<div class="layui-inline">
					<label class="layui-form-label">Action：</label>
					<div class="layui-input-inline">
						<input type="tel" name="phone" lay-verify="required|phone" autocomplete="off" class="layui-input">
					</div>
				</div>
				<div class="layui-inline">
					<label class="layui-form-label">结果集：</label>
					<div class="layui-input-inline">
						<input type="text" name="email" lay-verify="email" autocomplete="off" class="layui-input">
					</div>
				</div>
			</div>
		</form>
		<script src="../../res/libs/jquery-1.12.4.min.js"></script>
		<script src="../../res/libs/layui/layui.all.js"></script>
		<script src="../../res/libs/lodash/lodash.min.js"></script>
		<script src="../../app.js"></script>
		<script src="../../res/dsf_res/dsf_config.js"></script>
		<script src="../../res/dsf_res/dsf_common.js"></script>
		<script src="../../dsfa/pd/res/ds_prop.js"></script>
		<script src="../../dsfa/pd/res/libs/angular/angular.min.js"></script>
		<script>
			angular.module('myApp', []).controller('myCtrl', function($scope) {
				$scope.config = {
					superType: '0'
				}
				setTimeout(function() {
					layui.form.render();
				})
		
				layui.form.on('radio', function(data) {
					var name = data.elem.getAttribute('name');
					if (name) {
						$scope.config[name] = data.value;
						$scope.$apply();
					}
				});
			})
		</script>
	</body>
</html>
