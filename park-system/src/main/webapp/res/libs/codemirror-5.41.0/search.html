	<body><div id="nav">

    </div>        <article>    <h2>Search/Replace Demo</h2>    <form><textarea id="code" name="code" style="display: none;">&lt;dl&gt;      &lt;dt id="option_indentWithTabs"&gt;&lt;code&gt;&lt;strong&gt;indentWithTabs&lt;/strong&gt;: boolean&lt;/code&gt;&lt;/dt&gt;      &lt;dd&gt;Whether, when indenting, the first N*&lt;code&gt;tabSize&lt;/code&gt;      spaces should be replaced by N tabs. Default is false.&lt;/dd&gt;          &lt;dt id="option_electricChars"&gt;&lt;code&gt;&lt;strong&gt;electricChars&lt;/strong&gt;: boolean&lt;/code&gt;&lt;/dt&gt;      &lt;dd&gt;Configures whether the editor should re-indent the current      line when a character is typed that might change its proper      indentation (only works if the mode supports indentation).      Default is true.&lt;/dd&gt;          &lt;dt id="option_specialChars"&gt;&lt;code&gt;&lt;strong&gt;specialChars&lt;/strong&gt;: RegExp&lt;/code&gt;&lt;/dt&gt;      &lt;dd&gt;A regular expression used to determine which characters      should be replaced by a      special &lt;a href="#option_specialCharPlaceholder"&gt;placeholder&lt;/a&gt;.      Mostly useful for non-printing special characters. The default      is &lt;code&gt;/[\u0000-\u0019\u00ad\u200b\u2028\u2029\ufeff]/&lt;/code&gt;.&lt;/dd&gt;      &lt;dt id="option_specialCharPlaceholder"&gt;&lt;code&gt;&lt;strong&gt;specialCharPlaceholder&lt;/strong&gt;: function(char)&nbsp;→&nbsp;Element&lt;/code&gt;&lt;/dt&gt;      &lt;dd&gt;A function that, given a special character identified by      the &lt;a href="#option_specialChars"&gt;&lt;code&gt;specialChars&lt;/code&gt;&lt;/a&gt;      option, produces a DOM node that is used to represent the      character. By default, a red dot (&lt;span style="color: red"&gt;•&lt;/span&gt;)      is shown, with a title tooltip to indicate the character code.&lt;/dd&gt;          &lt;dt id="option_rtlMoveVisually"&gt;&lt;code&gt;&lt;strong&gt;rtlMoveVisually&lt;/strong&gt;: boolean&lt;/code&gt;&lt;/dt&gt;      &lt;dd&gt;Determines whether horizontal cursor movement through      right-to-left (Arabic, Hebrew) text is visual (pressing the left      arrow moves the cursor left) or logical (pressing the left arrow      moves to the next lower index in the string, which is visually      right in right-to-left text). The default is &lt;code&gt;false&lt;/code&gt;      on Windows, and &lt;code&gt;true&lt;/code&gt; on other platforms.&lt;/dd&gt;    &lt;/dl&gt;    </textarea>
            <script>    var editor = CodeMirror.fromTextArea(document.getElementById("code"), {      mode: "python",      lineNumbers: true,      extraKeys: {"Alt-F": "findPersistent"}    });    </script>          </article>    </body>
