<script>
    //注入对象
    var object = {
            // "dsfa_mm.id": "qwe",
            // "dsfa_mm.name": "we",
            // "dsfa_mm.code": "we",
            // "dsfa_mm.type": {
            //     "text": "系统对象",
            //     "value": "2"
            // },
            // "dsfa_mm.at": "wewewe",
            // "dsfa_mm.controls": [{
            //     "text": "文本框",
            //     "value": "dsf.textbox"
            // }, {
            //     "text": "下拉框",
            //     "value": "dsf.select"
            // }],
            // "dsfa_mm_vatt": [{
            //     "dsfa_mm_vatt.name": "测试1",
            //     "dsfa_mm_vatt.code": "测试1",
            //     "dsfa_mm_vatt.type": {
            //         "text": "数字",
            //         "value": "number"
            //     },
            //     "dsfa_mm_vatt.length": "1",
            //     "dsfa_mm_vatt.min": "1",
            //     "dsfa_mm_vatt.max": "1",
            //     "dsfa_mm_vatt.dv": "12"
            // }, {
            //     "dsfa_mm_vatt.name": "测试2",
            //     "dsfa_mm_vatt.code": "测试2",
            //     "dsfa_mm_vatt.type": {
            //         "text": "数字",
            //         "value": "number"
            //     },
            //     "dsfa_mm_vatt.length": "测试2",
            //     "dsfa_mm_vatt.min": "1",
            //     "dsfa_mm_vatt.max": "12",
            //     "dsfa_mm_vatt.dv": "12"
            // }]
        }, // requier object
        variable = {},
        fks = []; // map object

    // key value map
    let kvm = (k, p) => {
        if (typeof(k) == 'string' && k.includes('.')) {
            let km = k.split('.'),
                vs = (variable[km[0]] || []);
            if (!vs.includes(km[1]))
                variable[km[0]] = vs.concat(km[1]);
        } else {
            let t = (typeof(k) == 'string' ? object[k] : k);
            (Array.isArray(t) ? t : Object.keys(t)).forEach(e => kvm(e, k));
        }
    }
    Object.keys(object).forEach(kvm);
    fks = Object.keys(variable);


    var value = `/**
  * F1：函数说明(API)
  * F11：全屏
  * Ctrl-S：保存
  * Ctrl-A：全选
  * Ctrl-D：删除行
  * Ctrl-Y：恢复上一步
  * Ctrl-Z：撤销上一步
  * Ctrl-F： 查找
  * Ctrl-H：替换
  * Ctrl-Home：跳转到首行
  * Ctrl-End：跳转到尾行
  * Ctrl-+：字体放大
  * Ctrl--：字体缩小
  * Ctrl-鼠标左键：跨行多选词
  * Alt-鼠标左键：跨行扩选
  * Alt-/:打开提示
  * 已注入对象: ${fks.join(", ")}
  */
` + `
dsfa_mm.id + dsfa_mm_vatt.code
dsfa_mm.at + 123
if (dsfa_mm.controls == 'abc') {
	1+1
}
`;

    // 保存操作
    let saveFn = cm => {
        //预处理删除注释
        let saveVal = cm.getValue().replace(/(?:^|\n|\r)\s*\/\*[\s\S]*?\*\/\s*(?:\r|\n|$)/g, '').replace(/(?:^|\n|\r)\s*\/\/.*(?:\r|\n|$)/g, ''),
            jsTemplate = saveVal,
            javaTemplate = '';

        /**
         * javascript 
         */
        {
            fks.forEach(k => {
                variable[k].forEach(v => {
                    var kv = k + '\.' + v;
                    jsTemplate = jsTemplate.replace(new RegExp().compile(kv, 'ig'), `get("${kv}")`);
                });
            });
        }
        console.log('javascript:\n', jsTemplate);

        /**
         * java
         */
        {
            let regexp = new RegExp().compile('[' + fks.join(',') + ']', 'ig');
            saveVal.split(/\n/).forEach(s => {
                if (regexp.test(s)) {
                    let ms = undefined;
                    if (ms = /(?<= *[if,while] *\()(.*)(?= *\))/ig.exec(s))
                        javaTemplate += s.replace(ms[0], `@[${ms[0]}]`);
                    else
                        javaTemplate += `@[${s}]`;
                } else
                    javaTemplate += s;
                javaTemplate += '\n'
            })
        }
        console.log('java:\n', javaTemplate);

        let pseudocode = cm.getValue();
        var template = {};
        // var template = codeKit.template(pseudocode, object);
        template.pseudocode = saveVal;
        template.java = javaTemplate;
        template.javascript = jsTemplate;
        return template;
    }

    var editor = null;

    function initEditor(data, code) {
		value=(code&&code.pseudocode)||"";
        editor = editorInit({
            codeEle: document.getElementById('code'),
            api: 'verify.API.md',
            value,
            saveFn,
            variable,
            keywords: 'if while for switch break return true false',
            otherWords: {
                javascript: {
                    regexObj: 'regexObj : 提供可选校验正则集合',
                    abs: 'abs(string) : 返回数的绝对值，空字符串返回0.0 \n 返回值：float',
                    ceil: 'ceil(string) : 对数进行上舍入，空字符串返回0.0 \n 返回值 float',
                    float: 'float(string) : 字符串转浮点数，空字符串返回0.0 \n 返回值：float',
                    floor: 'floor(string) : 对数进行下舍入，空字符串返回0.0 \n 返回值：float',
                    has: 'has(string: 字符串, string: 匹配字符串) : 是否存在此字符 \n 返回值：boolean',
                    int: 'int(string) \n 返回值：int 字符串转整数，空字符串返回0',
                    isEmpty: 'isEmpty(string) : 判断字符串是否为空字符串 \n 返回值：boolean',
                    isNotEmpty: 'isNotEmpty(string) : 判断字符串不为空字符串 \n 返回值：boolean',
                    isNotNull: 'isNotNull(object) : 判断字符串不为空 \n 返回值：boolean',
                    isNull: 'isNull(object) : 判断字符串是否为空 \n 返回值：boolean',
                    length: 'length(string) \n 返回值：int 返回字符串长度',
                    lower: 'lower(string) : 字符串转小写 \n 返回值：string',
                    match: 'match(string: 字符串, string/regex: 匹配字符串) : 找到一个或多个正则表达式的匹配，无匹配则返回空数组 \n 返回值：boolean',
                    matchL: 'matchL(string: 字符串, string/regex: 匹配字符串) : 获取左边则表达式的匹配；即第一个，无则返回空字符串 \n 返回值：boolean',
                    matchR: 'matchR(string: 字符串, string/regex: 匹配字符串) : 获取右边则表达式的匹配；即第最后一个，无则返回空字符串 \n 返回值：boolean',
                    replace: 'replace(string: 原字符串, string: 替换字符串, string/regex: 字符串或正则式) : 字符串替换，支持正则表达式 \n 返回值：string',
                    round: 'round(string) : 把数四舍五入为最接近的整数，空字符串返回0.0 \n 返回值：float',
                    sub: 'sub(string/array, int[, int]) : 字符串或数组切片; int 可为负数，则从末尾开始 \n 返回值：string/array',
                    test: 'test(string: 字符串, regex: 正则式) : 正则式匹配字符串 \n 返回值：boolean',
                    test1: 'test1(string: 字符串, char: regexObj正则式标识) : 正则式匹配字符串 \n 返回值：boolean',
                    trim: 'trim(string) : 字符串去除前后空格 \n 返回值：string',
                    up: 'up(string) : 字符串转大写 \n 返回值：string',
                }
            },
            language: 'javascript', //['python', 'javascript', 'java', 'sql', 'vue', 'html', 'markdown'],
            // theme: ['default', '3024-day', '3024-night', 'abcdef', 'ambiance',
            //     'base16-dark', 'base16-light', 'bespin', 'blackboard', 'cobalt',
            //     'colorforth', 'darcula', 'dracula', 'duotone-dark', 'duotone-light',
            //     'eclipse', 'elegant', 'erlang-dark', 'gruvbox-dark', 'hopscotch',
            //     'icecoder', 'idea', 'isotope', 'lesser-dark', 'liquibyte', 'lucario',
            //     'material', 'mbo', 'mdn-like', 'midnight', 'monokai', 'neat', 'neo',
            //     'night', 'oceanic-next', 'panda-syntax', 'paraiso-dark', 'paraiso-light',
            //     'pastel-on-dark', 'railscasts', 'rubyblue', 'seti', 'shadowfox',
            //     'solarized dark', 'solarized light', 'the-matrix', 'tomorrow-night-bright',
            //     'tomorrow-night-eighties', 'ttcn', 'twilight', 'vibrant-ink', 'xq-dark', 'xq-light', 'yeti', 'zenburn'
			// ],
			theme:"default"
        });
	}
	
	function getContent() {
        return saveFn(editor);
    }

    function setValue(value){
        editor.setValue(value)
    }
    function resize(){
        editor.setSize(window.innerWidth-2,window.innerHeight-2);
    }
    function refreshEditor(){
        editor.refresh();
    }
</script>
