    <script>
    	var value = `# In[]
import sys
import json
import time
import pandas as pd
from concurrent.futures import ThreadPoolExecutor as pool, wait, ALL_COMPLETED
sys.path.append(r'D:/workspace_python/computer')
from summary import sum, oracledb as oracle, POOL as pool_cfg
import summary.weight as w

start_main = time.time()

params = json.loads(sys.argv[1].replace("'", "\\"") or '{}')
print('参数', params)
coun = params.get('mongo_filter', {}).get('coun', 'A')#线程数标识；len>>>全国：1；省：2；市：4；区县：6

# BEGIN summary params
mongo_filter = params.get('mongo_filter', {})
weight = params.get('weight', 0)
rules = params.get('rules', {})# 分组规则
# END

def _run(area, mongo_filter, weight, rules):
	coun = area['CODE']
	if weight:
		where = ''
		weight.update(coun=coun)
		for f, v in weight.items():
			where += " and {0} = '{1}'".format(f, v)
        weight = w.get_data(weight_names='WTDESIGN', where=where)
    mongo_filter.update(coun=coun)
    summary = sum.Summary(mongo_filter=mongo_filter, weight=weight)
    indics = summary.summary(rules=rules)
    print('>>>', area)
    return indics

def _exec():
    db = oracle.OracleDB()
    area_sql = "SELECT AREACODE AS CODE, AREANAME AS NAME FROM T_AREA WHERE {w} AND LEVEL_CODE = 4 ORDER BY AREACODE".format(
        w=("PARENTAREACODE LIKE '{coun}'||'%'" if len(coun) < 6 else "AREACODE = '{coun}'").format(coun=coun)
    )
    areas_data = pd.read_sql(area_sql, con=db._conn)
    db.dispose()
    # p = pool(max_workers=pool_cfg.get('sum', {}).get('maxsize', 10))
    # all_task = [p.submit(_run, (area, mongo_filter.copy(), weight and weight.copy(), rules)) for area in areas_data.iterrows()]
    # wait(all_task, return_when=ALL_COMPLETED)
    print(area_sql)
    all_task = [_run(area[1], mongo_filter.copy(), weight and weight.copy(), rules) for area in areas_data.iterrows()]
    for indics in all_task: print(indics.T)
    print('汇总大小：', len(all_task))
    print('总耗时：', time.time() - start_main)
_exec()`;
	    var editor = CodeMirror.fromTextArea(document.getElementById('code'), {
	    	indentUnit: 4,
	    	matchBrackets: true,
	    	autoCloseTags: true,
	    	lineNumbers: true,
	    	foldGutter: true,
//	    	readOnly: true,
			showTrailingSpace: true,
			tabSize: 4,
	        indentWithTabs: true,
	    	extraKeys: {
	    		'Ctrl-Q': cm => cm.foldCode(cm.getCursor()),
	    		'F11': cm => cm.setOption('fullScreen', !cm.getOption('fullScreen')),
		        'Esc': cm => {
		        	if (cm.getOption('fullScreen')) cm.setOption('fullScreen', false);
		        },
		        'Ctrl-S': cm => alert(cm.getValue()),
		        'Ctrl-D': 'deleteLine',
    		},
    		highlightSelectionMatches: {showToken: /\w/, annotateScrollbar: true},
		    gutters: ['CodeMirror-linenumbers', 'CodeMirror-foldgutter']
	    });
	    
	    editor.setValue(value);
	    
		var	otherWorlds = {'python': {'summary': '汇总计算', 'print': '打印'}};//添加注释和额外添加提示
	    var extras = ['Enter', 'Backspace', 'ArrowDown', 'ArrowUp', 'ArrowLeft', 'ArrowRight'];//需要排除的按键
	    
	    //关键字提示
	    editor.on('keydown', (e, f) => {
	    	if (f.code.startsWith('Key')) {
				editor.showHint();
				console.log(f.code)
			}
	    });
	    
    	//加载提示
	    let loadOtherWorlds = () => {
			let worlds = CodeMirror.hintWords[editor.getMode().name], oW = otherWorlds[editor.getMode().name];
			if (oW)
				Array.isArray(oW) ? oW : Object.keys(oW).forEach( d => {
					if (!worlds.includes(d))
						worlds.push(d)
				})
	    }
	    
	    //语言选择
		CodeMirror.modeURL = 'mode/%N/%N.js';
		let langeageVal = () => {return document.getElementById('language').value}
		let languageChange = () => {
			let val = langeageVal(), m, mode, spec;
			if(m = /.+\.([^.]+)$/.exec(val)) {
				let info = CodeMirror.findModeByExtension(m[1]);
				if(info) {
					mode = info.mode;
					spec = info.mime;
				}
			} else if(/\//.test(val)) {
				let info = CodeMirror.findModeByMIME(val);
				if(info) {
					mode = info.mode;
					spec = val;
				}
			} else {
				mode = spec = val;
			}
			if(mode) {
				editor.setOption('mode', spec);
				CodeMirror.autoLoadMode(editor, mode);
				setTimeout(loadOtherWorlds, 1000)
			}
		}
		languageChange();//添加注释
	    let tipFun = (e, f) => {
    		let hintEle = document.getElementsByClassName('CodeMirror-hints'),
    		tipEle = document.getElementsByClassName('hint-tip')[0] || document.body.appendChild(document.createElement('span'));
    		if (hintEle.length > 0) {
    			let top = hintEle[0].offsetTop,
    			left = hintEle[0].offsetLeft;
    			tipEle.style.top = top + 'px';
    			tipEle.style.left = left + 78 + 'px';
    			tipEle.className = 'hint-tip';
    			let text = document.getElementsByClassName('CodeMirror-hint-active')[0].innerText,
    			comment = text == 'null' ? undefined : otherWorlds[editor.getMode().name][text];
    			if (comment) {
    				tipEle.innerText = comment;
					tipEle.style.display = 'block';
    			} else
					tipEle.style.display = 'none';
    		} else
				tipEle.style.display = 'none';
	    }
	    editor.on('keyup', tipFun);
	    
	    //皮肤历史记录
		let input = document.getElementById('theme');
		let selectTheme = () => {
			let theme = input.value;
			editor.setOption('theme', theme);
			location.hash = '#' + theme;
		}
	    let choice = (location.hash && location.hash.slice(1)) ||
	             (document.location.search &&
	              decodeURIComponent(document.location.search.slice(1)));
		if (choice)
	    	editor.setOption('theme', input.value = choice);
