<script>
    var variable = {};
    var variables = {};
    var editor = null;

    function initEditor() {
        var variable = window.frameElement ? window.frameElement.args.variable || {} : {};
        // var value = `'''
        //     F1：函数说明(API)
        //     F11：全屏
        //     Ctrl-S：保存
        //     Ctrl-A：全选
        //     Ctrl-D：删除行
        //     Ctrl-Y：恢复上一步
        //     Ctrl-Z：撤销上一步
        //     Ctrl-F： 查找
        //     Ctrl-H：替换
        //     Ctrl-Home：跳转到首行
        //     Ctrl-End：跳转到尾行
        //     Ctrl-+：字体放大
        //     Ctrl--：字体缩小
        //     Ctrl-鼠标左键：跨行多选词
        //     Alt-鼠标左键：跨行扩选
        //     Alt-/：打开提示
        //     已注入对象：${Object.keys(variable).join(', ') || '空'}
        //     '''
        //     `;
        var value=""
        //注入对象
        variables = {};
        Object.keys(variable).forEach(function(n, i) {
            variables[variable[n].name] = variable[n].values;
        });
        editor = editorInit({
            language: 'javascript',
            include: [],
            value: (window.frameElement ? window.frameElement.args.value : value) || localStorage.code || value,
            readOnly: window.frameElement ? window.frameElement.args.readOnly : false,
            api: 'calc.API.md',
            variable: variables,
            keywords: 'if else while for break continue return null undefined typeof var length switch case ',
            saveFn: function(cm) {
                // localStorage.code = cm.getValue();
                // localStorage.cursor = JSON.stringify(cm.getCursor());
                // localStorage.scrollTop = editor.getDoc().scrollTop;
                
                // window.frameElement.closeWindow()
            },
            otherWords: {
                javascript: {
                    dsf:"dsf框架对象",
                    url:"获取url处理对象",
                    queryString:"获取url查询字符串",
                    page:"页面对象",
                    getControl:'获取控件,参数控件的caption属性',
                    PageEvent:'页面事件',
                    LOADED:"页面加载完毕",
                    FormControlEvent:'表单组件事件',
                    VALUECHANGE:'值变化',
                    event:"组件事件",
                    on:"组件事件监听,参数1：事件名称\r\n,参数2：callback回调函数",
                    $:"jquery对象",
                    addRule:"添加审核规则"
                },
                theme: ['default', '3024-day', '3024-night', 'abcdef', 'ambiance',
                    'base16-dark', 'base16-light', 'bespin', 'blackboard', 'cobalt',
                    'colorforth', 'darcula', 'dracula', 'duotone-dark', 'duotone-light',
                    'eclipse', 'elegant', 'erlang-dark', 'gruvbox-dark', 'hopscotch',
                    'icecoder', 'idea', 'isotope', 'lesser-dark', 'liquibyte', 'lucario',
                    'material', 'mbo', 'mdn-like', 'midnight', 'monokai', 'neat', 'neo',
                    'night', 'oceanic-next', 'panda-syntax', 'paraiso-dark', 'paraiso-light',
                    'pastel-on-dark', 'railscasts', 'rubyblue', 'seti', 'shadowfox',
                    'solarized dark', 'solarized light', 'the-matrix', 'tomorrow-night-bright',
                    'tomorrow-night-eighties', 'ttcn', 'twilight', 'vibrant-ink', 'xq-dark', 'xq-light', 'yeti', 'zenburn'
                ],
            },
            //			theme: ['default', '3024-day', '3024-night', 'abcdef', 'ambiance',
            //				'base16-dark', 'base16-light', 'bespin', 'blackboard', 'cobalt',
            //				'colorforth', 'darcula', 'dracula', 'duotone-dark', 'duotone-light',
            //				'eclipse', 'elegant', 'erlang-dark', 'gruvbox-dark', 'hopscotch',

            //				'night', 'oceanic-next', 'panda-syntax', 'paraiso-dark', 'paraiso-light',
            //				'pastel-on-dark', 'railscasts', 'rubyblue', 'seti', 'shadowfox',
            //				'solarized dark', 'solarized light', 'the-matrix', 'tomorrow-night-bright',
            //				'tomorrow-night-eighties', 'ttcn', 'twilight', 'vibrant-ink', 'xq-dark', 'xq-light', 'yeti', 'zenburn'],
        });
        if (localStorage.cursor)
            editor.setCursor(JSON.parse(localStorage.cursor));
        if (localStorage.scrollTop)
            editor.display.scroller.scrollTop = localStorage.scrollTop;
    }
    function getContent(){
        return editor.getValue()
    }
